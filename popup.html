<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recollect</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-shell">
    <header class="popup-header">
      <img class="logo" src="recollect-logo.png" alt="Recollect logo" />
      <div>
        <h1>Recollect</h1>
        <p class="subtitle">Save what matters</p>
      </div>
    </header>

    <div class="actions">
      <button id="saveSelectionBtn" class="btn btn-primary">
        <span class="btn-icon">✧</span>
        Save current selection
      </button>
      <button id="savePageBtn" class="btn btn-secondary">
        <span class="btn-icon">◧</span>
        Save current page
      </button>
      <button id="openRecollectBtn" class="btn btn-outline">
        <span class="btn-icon">↗</span>
        Open Recollect
      </button>
    </div>

    <div class="status-bar">
      <span id="statusMessage">Ready</span>
      <button id="settingsBtn" class="btn-icon-only" title="Settings">⚙</button>
    </div>

    <div class="stats">
      <p>Saved: <strong id="savedCount">0</strong></p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
