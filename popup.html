<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recollect</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-shell">
    <header class="popup-header">
      <img class="logo" src="recollect-logo.png" alt="Recollect logo" />
      <div>
        <h1>Recollect</h1>
      </div>
    </header>

    <div class="project-row">
      <select id="projectSelect" class="project-select">
        <option value="">— None —</option>
      </select>
      <button id="newProjectBtn" class="btn-icon-only" title="New project">+</button>
    </div>

    <div class="actions">
      <button id="saveSelectionBtn" class="btn btn-primary">
        <span class="btn-icon">✧</span>
        <span>Save selection</span>
        <span id="shortcut-save-selection" class="shortcut-hint"></span>
      </button>
      <button id="savePageBtn" class="btn btn-secondary">
        <span class="btn-icon">◧</span>
        <span>Save page</span>
        <span id="shortcut-save-page" class="shortcut-hint"></span>
      </button>
      <button id="openRecollectBtn" class="btn btn-outline">
        <span class="btn-icon">↗</span>
        <span>Open Recollect</span>
        <span id="shortcut-open-recollect" class="shortcut-hint"></span>
      </button>
    </div>

    <div class="settings-row">
      <button id="settingsBtn" class="btn-icon-only" title="Settings">⚙</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
